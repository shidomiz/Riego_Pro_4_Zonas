<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riego Pro 4 Zonas</title>

<style>
body{
font-family:Segoe UI,sans-serif;
background:#121212;
color:#fff;
margin:0;
padding:0;
}

header{
background:#1e4620;
padding:15px;
text-align:center;
}

h1{
margin:0;
color:#2ecc71;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.card{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-top:15px;
}

button{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.on{
background:#2ecc71;
color:black;
}

.off{
background:#e74c3c;
color:white;
}
</style>
</head>

<body>

<header>
<h1>PRO-GUARD RIEGO 4 ZONAS</h1>
</header>

<div class="container">

<div class="card">
<h2>Estados en Tiempo Real</h2>

<p>Zona 1: <span id="z1">---</span></p>
<p>Zona 2: <span id="z2">---</span></p>
<p>Zona 3: <span id="z3">---</span></p>
<p>Zona 4: <span id="z4">---</span></p>

<p>Motor: <span id="motor">---</span></p>
<p>Lluvia: <span id="lluvia">---</span></p>

</div>

<div class="card">
<h2>Control Manual</h2>

<button class="on" onclick="enviar('riego/cmd/zona1','ON')">
ENCENDER ZONA 1
</button>

<button class="off" onclick="enviar('riego/cmd/zona1','OFF')">
APAGAR ZONA 1
</button>

<button class="on" onclick="enviar('riego/cmd/zona2','ON')">
ENCENDER ZONA 2
</button>

<button class="off" onclick="enviar('riego/cmd/zona2','OFF')">
APAGAR ZONA 2
</button>

<button class="on" onclick="enviar('riego/cmd/zona3','ON')">
ENCENDER ZONA 3
</button>

<button class="off" onclick="enviar('riego/cmd/zona3','OFF')">
APAGAR ZONA 3
</button>

<button class="on" onclick="enviar('riego/cmd/zona4','ON')">
ENCENDER ZONA 4
</button>

<button class="off" onclick="enviar('riego/cmd/zona4','OFF')">
APAGAR ZONA 4
</button>

</div>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>

const client = mqtt.connect(
'wss://e0ece1d60e044c559704fc73233355d9.s1.eu.hivemq.cloud:8884/mqtt',
{
  username: 'hivemq.webclient.1781702540240',
  password: '.&,Q>1V0cXv2rqUd3fWR'
}
);

client.subscribe('riego/estado');

client.on('connect', () => {

  console.log('MQTT conectado');

  client.subscribe('riego/estado');

});

function enviar(topic,mensaje){
client.publish(topic,mensaje);
alert('Enviado: '+mensaje);
}

client.on('message', (topic, message) => {

  if (topic === 'riego/estado') {

    let d = JSON.parse(message.toString());

    document.getElementById('z1').innerText =
      d.z1 ? '🟢 ON' : '🔴 OFF';

    document.getElementById('z2').innerText =
      d.z2 ? '🟢 ON' : '🔴 OFF';

    document.getElementById('z3').innerText =
      d.z3 ? '🟢 ON' : '🔴 OFF';

    document.getElementById('z4').innerText =
      d.z4 ? '🟢 ON' : '🔴 OFF';

    document.getElementById('motor').innerText =
      d.motor ? '🟢 ACTIVO' : '🔴 PARADO';

    document.getElementById('lluvia').innerText =
      d.lluvia ? '🌧 LLUVIA' : '☀ SECO';
  }
});

</script>

</body>
</html>
