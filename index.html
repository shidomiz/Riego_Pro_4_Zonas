<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riego Pro 4 Zonas</title>

<style>
body{
font-family:Segoe UI,sans-serif;
background:#121212;
color:#fff;
margin:0;
padding:0;
}

header{
background:#1e4620;
padding:15px;
text-align:center;
}

h1{
margin:0;
color:#2ecc71;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.card{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-top:15px;
}

button{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.on{
background:#2ecc71;
color:black;
}

.off{
background:#e74c3c;
color:white;
}
</style>
</head>

<body>

<header>
<h1>PRO-GUARD RIEGO 4 ZONAS</h1>
</header>

<div class="container">

  <div class="card">

<h2>Estado General</h2>

<p>Hora RTC: <span id="hora">---</span></p>

<p>Modo Automático:
<span id="auto">---</span>
</p>

</div>

<div class="card">
<h2>Estados en Tiempo Real</h2>

<p>
<span id="nombre1">Zona 1</span>:
<span id="z1">---</span>
</p>

<p>
<span id="nombre2">Zona 2</span>:
<span id="z2">---</span>
</p>

<p>
<span id="nombre3">Zona 3</span>:
<span id="z3">---</span>
</p>

<p>
<span id="nombre4">Zona 4</span>:
<span id="z4">---</span>
</p>

<p>
Motor:
<span id="motor">---</span>
</p>

<p>
Lluvia:
<span id="lluvia">---</span>
</p>

</div>
 
<div class="card">
<h2>Programación</h2>

<h3 id="nombre1p">Zona 1</h3>
<p id="prog1">---</p>

<h3 id="nombre2p">Zona 2</h3>
<p id="prog2">---</p>

<h3 id="nombre3p">Zona 3</h3>
<p id="prog3">---</p>

<h3 id="nombre4p">Zona 4</h3>
<p id="prog4">---</p>

</div> 

<div class="card">
<h2>Control Manual</h2>

<button class="on" onclick="enviar('riego/cmd/zona1','ON')">
ENCENDER ZONA 1
</button>

<button class="off" onclick="enviar('riego/cmd/zona1','OFF')">
APAGAR ZONA 1
</button>

<button class="on" onclick="enviar('riego/cmd/zona2','ON')">
ENCENDER ZONA 2
</button>

<button class="off" onclick="enviar('riego/cmd/zona2','OFF')">
APAGAR ZONA 2
</button>

<button class="on" onclick="enviar('riego/cmd/zona3','ON')">
ENCENDER ZONA 3
</button>

<button class="off" onclick="enviar('riego/cmd/zona3','OFF')">
APAGAR ZONA 3
</button>

<button class="on" onclick="enviar('riego/cmd/zona4','ON')">
ENCENDER ZONA 4
</button>

<button class="off" onclick="enviar('riego/cmd/zona4','OFF')">
APAGAR ZONA 4
</button>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>

const client = mqtt.connect(
'wss://e0ece1d60e044c559704fc73233355d9.s1.eu.hivemq.cloud:8884/mqtt',
{
  username: 'hivemq.webclient.1781702540240',
  password: '.&,Q>1V0cXv2rqUd3fWR'
}
);

client.on('connect', () => {

  console.log('MQTT conectado');

  client.subscribe('riego/estado');

});

function enviar(topic,mensaje){
client.publish(topic,mensaje);
alert('Enviado: '+mensaje);
}

client.on('message', (topic, message) => {

  if (topic === 'riego/estado') {

    let d = JSON.parse(message.toString());

    console.log(d);

    document.getElementById('hora').innerText =
d.hora;

document.getElementById('auto').innerText =
d.auto ? '🟢 HABILITADO' : '🔴 DESHABILITADO';

    document.getElementById('nombre1').innerText = d.nombre1;
    document.getElementById('nombre2').innerText = d.nombre2;
    document.getElementById('nombre3').innerText = d.nombre3;
    document.getElementById('nombre4').innerText = d.nombre4;

    document.getElementById("nombre1p").innerText = d.nombre1;
    document.getElementById("nombre2p").innerText = d.nombre2;
    document.getElementById("nombre3p").innerText = d.nombre3;
    document.getElementById("nombre4p").innerText = d.nombre4;

    document.getElementById("prog1").innerHTML =
    "Turno 1: " + d.z1h1 + " (" + d.z1d1 + " min)<br>" +
    "Turno 2: " + d.z1h2 + " (" + d.z1d2 + " min)";

    document.getElementById("prog2").innerHTML =
    "Turno 1: " + d.z2h1 + " (" + d.z2d1 + " min)<br>" +
    "Turno 2: " + d.z2h2 + " (" + d.z2d2 + " min)";

    document.getElementById("prog3").innerHTML =
    "Turno 1: " + d.z3h1 + " (" + d.z3d1 + " min)<br>" +
    "Turno 2: " + d.z3h2 + " (" + d.z3d2 + " min)";

    document.getElementById("prog4").innerHTML =
    "Turno 1: " + d.z4h1 + " (" + d.z4d1 + " min)<br>" +
    "Turno 2: " + d.z4h2 + " (" + d.z4d2 + " min)";   

    document.getElementById('z1').innerText =
      d.z1 ? '🟢 ON' : '🔴 OFF';

    document.getElementById('z2').innerText =
      d.z2 ? '🟢 ON' : '🔴 OFF';

    document.getElementById('z3').innerText =
      d.z3 ? '🟢 ON' : '🔴 OFF';

    document.getElementById('z4').innerText =
      d.z4 ? '🟢 ON' : '🔴 OFF';

    document.getElementById('motor').innerText =
      d.motor ? '🟢 ACTIVO' : '🔴 PARADO';

    document.getElementById('lluvia').innerText =
      d.lluvia ? '🌧 LLUVIA' : '☀ SECO';

document.getElementById('programacion').innerHTML =

'<b>' + d.nombre1 + '</b><br>' +
'Turno 1: ' + d.z1h1 + ' (' + d.z1d1 + ' min)<br>' +
'Turno 2: ' + d.z1h2 + ' (' + d.z1d2 + ' min)<br><br>' +

'<b>' + d.nombre2 + '</b><br>' +
'Turno 1: ' + d.z2h1 + ' (' + d.z2d1 + ' min)<br>' +
'Turno 2: ' + d.z2h2 + ' (' + d.z2d2 + ' min)<br><br>' +

'<b>' + d.nombre3 + '</b><br>' +
'Turno 1: ' + d.z3h1 + ' (' + d.z3d1 + ' min)<br>' +
'Turno 2: ' + d.z3h2 + ' (' + d.z3d2 + ' min)<br><br>' +

'<b>' + d.nombre4 + '</b><br>' +
'Turno 1: ' + d.z4h1 + ' (' + d.z4d1 + ' min)<br>' +
'Turno 2: ' + d.z4h2 + ' (' + d.z4d2 + ' min)';
    
  }
});

</script>

</body>
</html>
